<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>SecureVault — Login</title>
  <link rel="stylesheet" href="common.css"/>
  <link rel="stylesheet" href="auth.css"/>
</head>
<body>
<div id="particles"></div>

<nav class="navbar">
  <a class="navbar-brand" href="welcome.html">
    <div class="nav-logo-wrap"><div class="img-placeholder" style="width:32px;height:32px;border-radius:8px;"><img src="ChatGPT Image 14 juil. 2026, 09_33_25.png" alt="SecureVault logo" style="width:100%;height:100%;object-fit:cover;border-radius:8px;"/></div></div>
    Secure<span>Vault</span>
  </a>
  <a href="register.html" class="btn btn-ghost" style="padding:8px 20px;font-size:13px;">Register</a>
</nav>

<div class="page-wrapper">
<div class="auth-container">
  <div class="auth-card card animate-in">

    <!-- Logo / hero image -->
    <div class="auth-logo-wrap">
      <!--
        IMAGE: login page hero icon/illustration
        Replace src="" with e.g. src="images/vault-login.png"
      -->
      <div class="img-placeholder auth-logo-img"><img src="" alt="SecureVault login"/></div>
    </div>

    <h1 class="auth-title">Welcome <span style="color:var(--blue)">Back</span></h1>
    <p class="auth-sub">Access your encrypted vault</p>

    <div class="alert alert-error"   id="errorBox"></div>
    <div class="alert alert-success" id="successBox"></div>

    <form id="loginForm">
      <div class="field">
        <label>Email Address</label>
        <input type="email" id="email" placeholder="you@example.com" required autocomplete="email"/>
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="password" placeholder="&#9679;&#9679;&#9679;&#9679;&#9679;&#9679;&#9679;&#9679;" required autocomplete="current-password"/>
      </div>
      <button type="submit" class="btn btn-blue" style="width:100%;justify-content:center;margin-top:8px;" id="submitBtn">
        Sign In
      </button>
    </form>

    <p class="auth-footer">
      Don't have an account? <a href="register.html">Create one</a>
    </p>
  </div>
</div>
</div>

<script src="particles.js"></script>
<script src="auth.js"></script>
</body>
</html>
