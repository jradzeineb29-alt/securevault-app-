<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>

  <title>SecureVault — Category</title>
  <link rel="stylesheet" href="common.css"/>

<body>
<nav class="navbar">
  <a class="navbar-brand" href="welcome.html">
    <div class="nav-logo-wrap">
      <img src="ChatGPT Image 14 juil. 2026, 09_33_25.png" alt="logo" style="width:100%;height:100%;object-fit:cover;border-radius:8px;"/>
    </div>
    Secure<span>Vault</span>
  </a>
  <div class="navbar-links" id="navbarLinks">
    <a href="welcome.html" class="nav-link">Home</a>
    <a href="home.html"    class="nav-link" id="nlDashboard">Dashboard</a>
    <a href="profile.html" class="nav-link" id="nlProfile">Profile</a>

  <div id="entryView" style="display:none;">

  </div>

<script src="category.js"></script>
<script src="navbar.js"></script>
